<!doctype html><html lang="pl"><head><title>Otodom test fixture (Wesoła / Stara Miłosna)</title></head><body><script id="__NEXT_DATA__" type="application/json" crossorigin="anonymous">{"props":{"pageProps":{"lang":"pl","id":"4B4PJ","ad":{"id":67942063,"price":{"type":"","__typename":"AdvertPrice"},"market":"SECONDARY","services":[],"publicId":"","slug":"dzien-otwarty-dla-rodziny-lub-inwestycja-ID4B4PJ","advertiserType":"business","advertType":"AGENCY","source":"urn:partner:esticrm","createdAt":"2026-04-24T16:22:16+02:00","modifiedAt":"2026-05-13T14:45:42+02:00","description":"\u003cbr\u003eBiuro Nieruchomości EKSPERT LOKALNY zapraszam wszystkie zainteresowane osoby na dzień otwarty w dniu 16.05,2026 o godzinie 13:00\u003cbr\u003e\u003cbr\u003eMieszkanie dla rodziny lub inwestycja.!\u003cbr\u003e\u003cbr\u003eLokalizacja: Stara Miłosna ulica Gościniec 86\u003cbr\u003eMetraż: Pow całkowita 147m/kw + Loggia 6 m/kw\u003cbr\u003ePiętro: 3 z poddaszem użytkowym (mieszkanie 2 poziomowe)\u003cbr\u003eRok budowy: 1999 dobry standard, ekspozycja okien północ - południe\u003cbr\u003eStan prawny: Pełna własność z KW \u003cbr\u003eCena: 1 075 000 PLN \u003cbr\u003eCzynsz: 427 PLN (4 os)\u003cbr\u003eOgrzewanie : Gaz\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003eOPIS MIESZKANIA:\u003c/strong\u003e\u003cbr\u003eNa sprzedaż klimatyczne, rozkładowe 5-pokojowe mieszkanie z oddzielną kuchnią o powierzchni użytkowej 125m2 (pow. całkowita 147 m2). Możliwość relaksu na świeżym powietrzu zapewnia 6 metrowa loggia z widokiem na zielone podwórko oraz okoliczny las. Mieszkanie usytuowane jest na 3-cim piętrze, 4 kondygnacyjnego budynku z 1999 roku, w dobrze skomunikowanej i spokojnej części Warszawy Wesołej - Stara Miłosna.\u003cbr\u003eMieszkanie ma ogromny potencjał, a jego funkcjonalność można dostosować zależnie od własnych potrzeb. Ze względu na ilość pomieszczeń jest to idealna przestrzeń dla dużej rodziny jak i idealna powierzchnia inwestycyjna. Mieszkanie można dostosować pod pokoje do wynajęcia. \u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003eLOKAL OFERUJE\u003c/strong\u003e\u003cbr\u003eMieszkanie dwupoziomowe z ekspozycją okien północ- południe, składające się z 80 m kw z poddaszem użytkowym 67m2.\u003cbr\u003e• I piętro:\u003cbr\u003e- korytarz ok (2m2)\u003cbr\u003e- przestronny salon (28 m2),\u003cbr\u003e- oddzielna kuchnia (12 m2),\u003cbr\u003e- jadalnia (10 m2),\u003cbr\u003e- 2 sypialnie (10 m2 i 12 m2),\u003cbr\u003e- łazienka (4 m2),\u003cbr\u003e- toaleta (2 m2),\u003cbr\u003e- loggia (6 m2),\u003cbr\u003e\u003cbr\u003e• II piętro:\u003cbr\u003eprzedpokój (6m2)\u003cbr\u003e- antresola na bibliotekę (5 m2),\u003cbr\u003e- 1 sypialnia (15 m2),\u003cbr\u003e- Pokój biurowy ( 9m2),\u003cbr\u003e- WC i pralnia (6 m2),\u003cbr\u003e- schowek (3 m2).\u003cbr\u003eNa poddaszu okna połaciowe doskonale doświetlają wnętrze.\u003cbr\u003e\u003cbr\u003eDo mieszkania przynależy dodatkowo komórka lokatorska 2 m/kw w piwnicy\u003cbr\u003e\u003cbr\u003eDodatkowo istnieje możliwość dokupienia pomieszczenia na poddaszu o powierzchni około 22m2 od wspólnoty mieszkaniowej\u003cbr\u003e\u003cbr\u003eDo mieszkania nie przynależy miejsce postojowe jest możliwość wynajęcia miejsca postojowego w cenie 100 PLN od wspólnoty mieszkaniowej\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003eOPIS BUDYNKU - LOKALIZACJA\u003c/strong\u003e\u003cbr\u003eBudynek z 1999 roku wybudowany z cegły znajduje się w bardzo dobrym stanie technicznym. \u003cbr\u003eW najbliższym otoczeniu pełna infrastruktura miejska: żłobki, przedszkola, szkoły podstawowe, licea, korty tenisowe, siłownie/ sale fitness, liczne lokale gastronomiczne, usługowe oraz sklepy. Dokładną lokalizacje przedstawiamy w poniższym linku :\u003cbr\u003e\u003cbr\u003e\u003cbr\u003eW sąsiedztwie znajduje się Park Krajobrazowy a w nim liczne trasy piesze oraz rowerowe.\u003cbr\u003e\u003cbr\u003e\u003cstrong\u003eKomunikacja:\u003c/strong\u003e\u003cbr\u003eNajbliższe przystanki autobusowe w obie strony znajdują się jedynie 300m od osiedla na ulicy Trakt Brzeski: ul. Marmurowa 173,147,502, w stronę Międzylesia i stacji kolejki ( Warszawa-Otwock) 198 w stronę kolejki Sulejówek-Okęcie i na Fabryczna 2 - linia 502, 704, 720, 722, 730 oraz N21. Co zapewnia dogodną komunikację miejską.\u003cbr\u003e\u003cbr\u003eZapraszamy do kontaktu!\u003cbr\u003eMonika Wasilewska \u003cbr\u003eTel 535-945-982\u003cbr\u003e\u003cbr\u003eOferta sprzedaży mieszkania dostępna wyłącznie w naszym biurze!\u003cbr\u003eZapraszam do kontaktu oraz do obejrzenia nieruchomości.\u003cbr\u003e\u003cbr\u003eP.s. Jeśli planujesz zakup nieruchomości przy pomocy kredytu, nasz broker finansowy bezkosztowo potwierdzi Twoją zdolność oraz sprawdzi, w którym banku otrzymasz najkorzystniejszą ofertę. Współpracujemy również z kancelarią prawną, która w ramach pośrednictwa na Twoją prośbę potwierdzi stan prawny nieruchomości a my zadbamy o bezpieczny przebieg transakcji od początku do końca, począwszy od przeniesienia własności, spisania protokołów zdawczo-odbiorczych, a na przekazaniu kluczy kończąc.\u003cbr\u003e\u003cbr\u003eNiniejsze ogłoszenie jest wyłącznie informacją i nie stanowi oferty w rozumieniu art. 66 § 1 Kodeksu Cywilnego. Dokładamy wszelkich starań, aby informacje przedstawione w naszych ofertach były aktualne i rzetelne. Informacje zawarte w ofercie uzyskano na podstawie oświadczeń sprzedających. Załączony plan nieruchomości jest poglądowy.\u003cbr\u003e\u003cbr\u003eBiuro nieruchomości Ekspert Lokalny jest objęte obowiązkiem ubezpieczenia odpowiedzialności cywilnej zawodowej. Posiadamy OC zgodne z Rozporządzeniem Ministra Finansów z dn. 26.04.2019 r. w sprawie obowiązkowego ubezpieczenia odpowiedzialności cywilnej pośrednika w obrocie nieruchomościami (Dz. U. z 2019 r., poz. 804)\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e\u003cbr\u003e","developmentId":0,"developmentTitle":"","developmentUrl":"","exclusiveOffer":false,"externalId":"b2bcba94-835b-45e3-b6
