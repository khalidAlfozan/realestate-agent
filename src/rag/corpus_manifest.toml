# NBP market-report corpus for the RAG layer — consumed by src/rag/ingest.py.
#
# These PDFs live on static.nbp.pl, which has no bot wall, so the ingestion
# script downloads them directly. The bot-walled cyclical quarterly/annual
# real-estate reports are added separately by dropping their PDFs into
# data/corpus/ — see the README's "Market-report retrieval" section.
#
# `title` is the document's stable id (its `source` in the pgvector store and
# the attribution shown in retrieval results). All URLs verified to serve a
# real PDF; titles for the Polish-language papers are descriptive translations.

