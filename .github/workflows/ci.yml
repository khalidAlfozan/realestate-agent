name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel a previous in-progress run when a new push lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only reads the checked-out code, never writes back.
permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    # Our CI finishes in well under a minute; 10 min is a generous ceiling
    # that still kills a hung run before it burns Actions minutes.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Set up uv (with cache)
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies (frozen)
        # --frozen errors out if pyproject.toml drifted from uv.lock —
        # forces dependency updates to go through Dependabot, not ad-hoc edits.
        run: uv sync --frozen

      - name: Lint (ruff check)
        # evals/ is real code (the eval harness) — lint it too, not just src + tests.
        run: uv run ruff check src tests evals

      - name: Format check (ruff format --check)
        run: uv run ruff format --check src tests evals

      - name: Type check (pyright)
        run: uv run pyright

      - name: Dependency hygiene (deptry)
        # Catches unused / missing / transitively-imported dependencies.
        # Pre-installed RAG deps (pgvector, psycopg, voyageai) are
        # explicitly allowlisted in pyproject.toml [tool.deptry].
        run: uv run deptry .

      - name: Tests + coverage (pytest)
        # pytest config in pyproject.toml adds --cov flags and enforces
        # the fail_under threshold from [tool.coverage.report].
        run: uv run pytest -q
